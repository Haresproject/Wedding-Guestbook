<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar Tamu</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <img src="assets/logo.png">

            <h2>Wedding Guestbook</h2>

        </div>

        <nav>

            <a href="dashboard.html">🏠 Dashboard</a>

            <a href="guests.html" class="active">👥 Daftar Tamu</a>

            <a href="scanner.html">📷 Scanner</a>

            <a href="https://script.google.com/macros/s/AKfycbxypLyJtFO5DdrkBFHPEE6fGqG8HvHyubI4hxfN4jcb00m5auniNEjIvpfQLrFs5Y7P/exec?page=display" target="_blank">
                📺 Display
            </a>

            <a href="settings.html">⚙ Pengaturan</a>

            <a href="#" onclick="logout()">🚪 Logout</a>

        </nav>

    </aside>

    <!-- CONTENT -->

    <main class="content">

        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:20px;gap:15px;">

    <h1>👥 Daftar Tamu</h1>

    <div>

        <input
            type="file"
            id="excelFile"
            accept=".xlsx,.xls"
            style="display:none;">

        <button onclick="document.getElementById('excelFile').click()">
            📥 Import Excel
        </button>

    </div>

</div>

<input
    type="text"
    id="search"
    placeholder="Cari nama tamu..."
>
<div class="export-btn">

    <button onclick="exportExcel()">
        📥 Export Excel
    </button>

    <button onclick="exportPDF()">
        📄 Export PDF
    </button>

</div>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Nama</th>
                    <th>Status</th>
                    <th>Tipe</th>
                    <th>Jam Hadir</th>
                    <th>Aksi</th>

                </tr>

            </thead>

            <tbody id="guestTable">

            </tbody>

        </table>

    </main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="js/guests.js"></script>

<script>

if(localStorage.getItem("login")!="true"){

    location.href="index.html";

}

function logout(){

    localStorage.removeItem("login");

    location.href="index.html";

}

</script>

</body>
</html>
