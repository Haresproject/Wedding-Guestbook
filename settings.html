<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <img src="assets/logo.png">
            <h2>Wedding Guestbook</h2>
        </div>

        <nav>

    <a href="dashboard.html">🏠 Dashboard</a>

    <a href="guests.html">👥 Daftar Tamu</a>

    <a href="scanner.html">📷 Scanner</a>

    <a href="https://script.google.com/macros/s/AKfycbxypLyJtFO5DdrkBFHPEE6fGqG8HvHyubI4hxfN4jcb00m5auniNEjIvpfQLrFs5Y7P/exec?page=display" target="_blank">
        📺 Display
    </a>

    <a href="settings.html" class="active">⚙ Pengaturan</a>

    <a href="#" onclick="logout()">🚪 Logout</a>

</nav>

    </aside>

    <main class="content">

        <h1>Pengaturan Wedding</h1>

        <div class="card">

            <label>Nama Pengantin Wanita</label>
            <input id="bride" type="text">

            <br><br>

            <label>Nama Pengantin Pria</label>
            <input id="groom" type="text">

            <br><br>

            <label>Tanggal Wedding</label>
            <input id="date" type="date">

            <br><br>

            <label>Lokasi</label>
            <input id="venue" type="text">

            <br><br>

            <label>Logo Wedding</label>

<input
    type="file"
    id="logoFile"
    accept="image/*">

<input
    type="hidden"
    id="logo">

<br><br>

<img
    id="logoPreview"
    style="
        width:150px;
        border-radius:12px;
        display:none;
        border:1px solid #ddd;
    ">

<label>Background Wedding</label>

<input
    type="file"
    id="bgFile"
    accept="image/*">

<input
    type="hidden"
    id="background">

<br><br>

<img
    id="bgPreview"
    style="
        width:100%;
        max-height:220px;
        object-fit:cover;
        border-radius:12px;
        display:none;
        border:1px solid #ddd;
    ">

            <br><br>

            <label>Tema</label>

<select id="theme">

    <option value="emerald">🌿 Emerald</option>
    <option value="gold">🥇 Gold</option>
    <option value="rosegold">🌸 Rose Gold</option>
    <option value="royalblue">🔵 Royal Blue</option>
    <option value="black">⚫ Black Luxury</option>

</select>

<br><br>

<label>Username Admin</label>

<input
    id="username"
    type="text">

<br><br>

<label>Password Admin</label>

<input
    id="password"
    type="password">

<br><br>

<button id="saveBtn">💾 Simpan</button>

        </div>

    </main>

</div>

<script src="js/settings.js"></script>

<script>

if(localStorage.getItem("login")!="true"){

    location.href="index.html";

}

function logout(){

    localStorage.removeItem("login");

    location.href="index.html";

}

</script>

</body>
</html>
