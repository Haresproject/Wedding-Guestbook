<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanner QR</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

#reader{
    width:100%;
    margin-top:20px;
}

select,
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    font-size:16px;
}

button{
    background:var(--primary);
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:var(--secondary);
}

#status{
    margin-top:20px;
    font-size:18px;
    text-align:center;
}

/* POPUP */

.popup{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    display:none;

    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.6);

    z-index:9999;

}

.popup-card{

    background:white;

    padding:35px;

    border-radius:18px;

    width:90%;
    max-width:420px;

    text-align:center;

}

.popup-card h1{

    color:#4CAF50;

}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>Wedding Guestbook</h2>

</div>

<nav>

<a href="dashboard.html">🏠 Dashboard</a>

<a href="guests.html">👥 Daftar Tamu</a>

<a href="scanner.html" class="active">📷 Scanner</a>

<a href="https://script.google.com/macros/s/AKfycbxypLyJtFO5DdrkBFHPEE6fGqG8HvHyubI4hxfN4jcb00m5auniNEjIvpfQLrFs5Y7P/exec?page=display" target="_blank">
📺 Display
</a>

<a href="settings.html">⚙ Pengaturan</a>

<a href="#" onclick="logout()">🚪 Logout</a>

</nav>

</aside>

<!-- CONTENT -->

<main class="content">

<h1>📷 Scanner QR Wedding</h1>

<select id="cameraSelect"></select>

<button id="startBtn">

▶ Mulai Scanner

</button>

<div id="reader"></div>

<p id="status">

Pilih kamera lalu tekan Mulai Scanner

</p>

</main>

</div>

<div id="popupSuccess" class="popup">

<div class="popup-card">

<h1>✅ BERHASIL</h1>

<h2 id="guestName"></h2>

<p id="guestType"></p>

</div>

</div>

<script src="js/scanner.js"></script>

<script>

if(localStorage.getItem("login")!="true"){

    location.href="index.html";

}

function logout(){

    localStorage.removeItem("login");

    location.href="index.html";

}

</script>

</body>
</html>
